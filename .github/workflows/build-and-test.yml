name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests with coverage
        run: npm test -- --coverage --coverageReporters=text-summary --coverageReporters=json-summary

      - name: Check coverage threshold
        run: |
          COVERAGE=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(c.total.statements.pct)")
          echo "Statement coverage: ${COVERAGE}%"
          node -e "if ($COVERAGE < 95) { console.error('Coverage ${COVERAGE}% is below 95% threshold'); process.exit(1); }"

      - name: Build
        run: npm run build
