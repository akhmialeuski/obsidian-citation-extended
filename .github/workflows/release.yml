name: Release Plugin

# Runs automatically when a version tag is pushed (created by `npm run release`).
# Builds the plugin, attaches the Obsidian-required assets to a GitHub release,
# and attaches a build-provenance attestation to each asset.
on:
  push:
    tags:
      # standard-version emits plain semver tags here (e.g. 0.7.0); the
      # v-prefixed pattern also covers the tool's default prefix, so the
      # release fires regardless of which form the tag takes.
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
      id-token: write # required by attest-build-provenance
      attestations: write # required by attest-build-provenance
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      # Produces a signed provenance attestation for the release artifacts,
      # covering all three Obsidian-required assets.
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
