name: Release Plugin

# Runs automatically when a version tag is pushed (created by `npm run release`).
# Builds the plugin, attaches the Obsidian-required assets to a GitHub release,
# attaches a build-provenance attestation to each asset, and publishes the
# curated release notes from docs/releases/<version>.md. Notes are never
# auto-generated: a release with no curated notes file fails on purpose.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
      id-token: write # required by attest-build-provenance
      attestations: write # required by attest-build-provenance
    steps:
      - uses: actions/checkout@v4

      # Resolve the version from the tag (with or without a leading "v"), the
      # release title, and the curated release-notes file that must accompany it.
      - name: Resolve release metadata
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          {
            echo "version=$version"
            echo "title=v$version"
            echo "notes=docs/releases/$version.md"
          } >> "$GITHUB_OUTPUT"

      # Fail fast (before the slow build) if the curated notes are missing, so a
      # release never goes out with empty or auto-generated notes.
      - name: Require curated release notes
        run: |
          notes="${{ steps.meta.outputs.notes }}"
          if [ ! -f "$notes" ]; then
            echo "::error::Missing release notes file '$notes'. Write it and commit before pushing the tag."
            exit 1
          fi

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      # Produces a signed provenance attestation for the release artifacts,
      # covering all three Obsidian-required assets.
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/main.js
            dist/manifest.json
            dist/styles.css

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.title }}
          body_path: ${{ steps.meta.outputs.notes }}
          files: |
            dist/main.js
            dist/manifest.json
            dist/styles.css
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
