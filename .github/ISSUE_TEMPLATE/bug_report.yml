name: Bug report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Open command palette
        2. Run "Insert citation"
        3. Search for "smith"
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console output
      description: >
        Open the Obsidian developer console (Ctrl+Shift+I), reproduce the issue,
        and paste any relevant error messages here.
      render: shell

  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: e.g. 1.7.4
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: e.g. 0.5.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
    validations:
      required: true

  - type: textarea
    id: bibliography
    attributes:
      label: Bibliography format
      description: What format is your bibliography file? (BibTeX, CSL-JSON, Hayagriva)
      placeholder: e.g. BibTeX exported from Zotero

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, screenshots, or sample bibliography entries.
